<!DOCTYPE html>
<html>
<head>
  <style>
    body, html {
      margin: 0;
      padding: 0;
      width: 100vw;
      height: 100vh;
      background: transparent;
      overflow: hidden;
      pointer-events: none; /* Let clicks pass through */
    }

    #blur-overlay {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: radial-gradient(circle, rgba(239, 68, 68, 0.2) 0%, rgba(239, 68, 68, 0.6) 100%);
      backdrop-filter: blur(0px);
      opacity: 0;
      transition: all 0.5s cubic-bezier(0.4, 0, 0.2, 1);
      display: flex;
      justify-content: center;
      align-items: center;
      z-index: 999999;
    }

    #blur-overlay.active {
      backdrop-filter: blur(25px);
      opacity: 1;
    }

    .pg-message {
      font-family: 'Instrument Serif', serif;
      font-size: 5rem;
      font-weight: 900;
      color: white;
      text-align: center;
      max-width: 80%;
      line-height: 1.1;
      text-shadow: 0 10px 30px rgba(0,0,0,0.5);
      opacity: 0;
      transform: scale(0.9) translateY(40px);
      transition: all 0.7s cubic-bezier(0.16, 1, 0.3, 1);
    }

    #blur-overlay.active .pg-message {
      opacity: 1;
      transform: scale(1) translateY(0);
    }

    /* Add a subtle vignette */
    #blur-overlay::after {
      content: '';
      position: absolute;
      inset: 0;
      background: radial-gradient(circle, transparent 20%, rgba(0,0,0,0.4) 100%);
      pointer-events: none;
    }
  </style>
  <link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@1&display=swap" rel="stylesheet">
</head>
<body>
  <div id="blur-overlay">
    <div id="overlay-message" class="pg-message italic font-serif">Time to take rest!</div>
  </div>
  <script src="overlay.js"></script>
</body>
</html>
