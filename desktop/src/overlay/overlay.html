<!DOCTYPE html>
<html>
<head>
  <style>
    body, html {
      margin: 0;
      padding: 0;
      width: 100vw;
      height: 100vh;
      background: transparent;
      overflow: hidden;
      pointer-events: none; /* Let clicks pass through */
    }

    #blur-overlay {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(255, 0, 0, 0); /* Invisible by default */
      backdrop-filter: blur(0px);
      transition: all 0.5s ease-in-out;
      display: flex;
      justify-content: center;
      align-items: center;
      z-index: 999999;
    }

    #blur-overlay.active {
      background: rgba(255, 0, 0, 0.4);
      backdrop-filter: blur(8px);
    }

    .pg-message {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      font-size: 4rem;
      font-weight: bold;
      color: white;
      text-shadow: 0 4px 20px rgba(0,0,0,0.8);
      opacity: 0;
      transform: translateY(20px);
      transition: all 0.5s ease-in-out;
    }

    #blur-overlay.active .pg-message {
      opacity: 1;
      transform: translateY(0);
    }
  </style>
</head>
<body>
  <div id="blur-overlay">
    <div id="overlay-message" class="pg-message">Straighten up! PostureGuard active.</div>
  </div>
  <script src="overlay.js"></script>
</body>
</html>
